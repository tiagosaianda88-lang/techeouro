<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artigo — Tech e Ouro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080808; --surface: #111111; --border: #1f1f1f;
      --gold: #C9A227; --gold-dim: #7a6118;
      --text: #F0EDE6; --muted: #666666;
      --serif: 'Playfair Display', serif; --sans: 'Inter', sans-serif;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); -webkit-font-smoothing: antialiased; }

    /* NAV */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(8,8,8,.95); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; height: 56px;
    }
    .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-logo svg { width: 36px; height: 36px; }
    .nav-brand { font-family: var(--serif); font-size: 1.15rem; font-weight: 700; letter-spacing: .04em; color: var(--gold); line-height: 1; }
    .nav-brand span { display: block; font-family: var(--sans); font-size: .55rem; font-weight: 500; letter-spacing: .18em; text-transform: uppercase; color: var(--muted); margin-top: 2px; }
    .nav-back { font-size: .68rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); text-decoration: none; border: 1px solid var(--border); padding: 8px 18px; transition: color .2s, border-color .2s; }
    .nav-back:hover { color: var(--gold); border-color: var(--gold-dim); }

    /* ARTICLE HEADER */
    .art-header { max-width: 860px; margin: 0 auto; padding: 64px 40px 48px; border-bottom: 1px solid var(--border); }
    .art-eyebrow { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
    .tag { font-size: .6rem; font-weight: 600; letter-spacing: .16em; text-transform: uppercase; color: var(--gold); border: 1px solid var(--gold-dim); padding: 4px 10px; }
    .art-date { font-size: .7rem; color: var(--muted); letter-spacing: .06em; }
    .art-read { font-size: .7rem; color: var(--muted); }
    .art-headline { font-family: var(--serif); font-size: clamp(2.2rem, 5vw, 3.8rem); font-weight: 900; line-height: 1.05; letter-spacing: -.02em; color: var(--text); margin-bottom: 24px; }
    .art-headline em { font-style: italic; color: var(--gold); }
    .art-lead { font-size: 1.1rem; line-height: 1.75; color: #aaaaaa; border-left: 3px solid var(--gold); padding-left: 20px; margin-bottom: 32px; }
    .art-byline { display: flex; align-items: center; gap: 16px; padding-top: 24px; border-top: 1px solid var(--border); }
    .byline-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--gold); display: flex; align-items: center; justify-content: center; font-family: var(--serif); font-weight: 700; font-size: 1rem; color: var(--bg); flex-shrink: 0; }
    .byline-name { font-size: .82rem; font-weight: 600; color: var(--text); }
    .byline-role { font-size: .68rem; color: var(--muted); margin-top: 2px; }

    /* BODY + SIDEBAR */
    .art-wrap { max-width: 1200px; margin: 0 auto; padding: 0 40px; display: grid; grid-template-columns: 1fr 300px; gap: 60px; align-items: start; }
    .art-body { padding: 48px 0; }
    .art-body h2 { font-family: var(--serif); font-size: 1.6rem; font-weight: 700; color: var(--text); margin: 48px 0 16px; padding-top: 48px; border-top: 1px solid var(--border); }
    .art-body h2:first-child { margin-top: 0; padding-top: 0; border-top: none; }
    .art-body h3 { font-family: var(--serif); font-size: 1.2rem; font-weight: 700; color: var(--gold); margin: 32px 0 12px; }
    .art-body p { font-size: .95rem; line-height: 2; color: #c8c0b8; margin-bottom: 20px; }
    .art-body strong { color: var(--text); font-weight: 600; }
    .art-body em { font-style: italic; color: var(--gold); }

    .pullquote { border-left: 3px solid var(--gold); padding: 20px 28px; margin: 40px 0; background: var(--surface); }
    .pullquote p { font-family: var(--serif); font-size: 1.3rem; font-weight: 700; line-height: 1.4; color: var(--text); margin: 0; }
    .pullquote cite { display: block; font-size: .7rem; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; margin-top: 12px; font-style: normal; }

    .data-box { background: var(--surface); border: 1px solid var(--border); padding: 24px 28px; margin: 32px 0; border-top: 2px solid var(--gold); }
    .data-box-title { font-size: .6rem; font-weight: 700; letter-spacing: .2em; text-transform: uppercase; color: var(--gold); margin-bottom: 16px; }
    .data-row { display: flex; justify-content: space-between; align-items: baseline; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: .85rem; }
    .data-row:last-child { border-bottom: none; }
    .data-label { color: var(--muted); }
    .data-value { font-weight: 600; color: var(--text); }
    .data-value.up { color: #00cc6a; }
    .data-value.down { color: #ff4455; }
    .art-divider { border: none; border-top: 1px solid var(--border); margin: 40px 0; }

    /* SIDEBAR */
    .art-sidebar { padding: 48px 0; position: sticky; top: 80px; }
    .sb-block { background: var(--surface); border: 1px solid var(--border); padding: 24px; margin-bottom: 24px; border-top: 2px solid var(--gold); }
    .sb-title { font-size: .6rem; font-weight: 700; letter-spacing: .2em; text-transform: uppercase; color: var(--gold); margin-bottom: 20px; }
    .sb-item { padding: 14px 0; border-bottom: 1px solid var(--border); }
    .sb-item:last-child { border-bottom: none; padding-bottom: 0; }
    .sb-item-tag { font-size: .55rem; letter-spacing: .14em; text-transform: uppercase; color: var(--gold-dim); margin-bottom: 6px; }
    .sb-item-title { font-family: var(--serif); font-size: .9rem; font-weight: 700; color: var(--text); line-height: 1.3; transition: color .2s; cursor: pointer; }
    .sb-item-title:hover { color: var(--gold); }
    .sb-item-date { font-size: .62rem; color: var(--muted); margin-top: 4px; }
    .sb-stat { text-align: center; padding: 16px 0; border-bottom: 1px solid var(--border); }
    .sb-stat:last-child { border-bottom: none; padding-bottom: 0; }
    .sb-stat-val { font-family: var(--serif); font-size: 2rem; font-weight: 700; color: var(--gold); }
    .sb-stat-lbl { font-size: .62rem; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; margin-top: 4px; }

    /* TAGS */
    .art-tags { max-width: 860px; margin: 0 auto; padding: 0 40px 64px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .art-tags-label { font-size: .7rem; color: var(--muted); margin-right: 4px; }

    /* RELATED */
    .related { max-width: 1200px; margin: 0 auto; padding: 48px 40px 80px; border-top: 1px solid var(--border); }
    .section-head { display: flex; align-items: center; gap: 16px; margin-bottom: 40px; }
    .section-head h2 { font-family: var(--serif); font-size: 1.5rem; font-weight: 700; color: var(--text); }
    .section-head::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .related-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); }
    .r-card { background: var(--bg); padding: 28px 24px; cursor: pointer; transition: background .25s; }
    .r-card:hover { background: var(--surface); }
    .r-card .tag { margin-bottom: 12px; display: inline-block; }
    .r-card-title { font-family: var(--serif); font-size: 1.1rem; font-weight: 700; line-height: 1.25; color: var(--text); margin-bottom: 12px; transition: color .2s; }
    .r-card:hover .r-card-title { color: var(--gold); }
    .r-card-date { font-size: .65rem; color: var(--muted); }

    /* FOOTER */
    footer { border-top: 1px solid var(--border); padding: 32px 40px; max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
    .footer-copy { font-size: .65rem; letter-spacing: .08em; color: var(--muted); }

    @media (max-width: 900px) {
      nav { padding: 0 20px; }
      .art-header { padding: 40px 20px 32px; }
      .art-wrap { grid-template-columns: 1fr; gap: 0; padding: 0 20px; }
      .art-sidebar { display: none; }
      .related { padding: 40px 20px 60px; }
      .related-grid { grid-template-columns: 1fr; }
      .art-tags { padding: 0 20px 48px; }
      footer { padding: 24px 20px; flex-direction: column; gap: 12px; }
    }
    .footer-fixed{position:fixed;bottom:0;right:0;z-index:50;padding:16px 20px;display:flex;align-items:center;gap:12px;background:rgba(8,8,8,.8);backdrop-filter:blur(10px);border-left:1px solid var(--border);border-top:1px solid var(--border)}
    .footer-fixed img{height:40px;width:auto;object-fit:contain}
  </style>
</head>
