name: AI News Aggregator

on:
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publicar o rascunho depois de todos os testes passarem'
        required: true
        default: false
        type: boolean

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser beautifulsoup4 pypdf
      - name: Run quality gates
        run: |
          python -m unittest discover -s scripts -p 'test_*.py'
          python scripts/verify_translations.py
          git diff --check
      - name: Prepare reviewed news draft
        run: |
          python scripts/update_news.py
      - name: Publish reviewed draft
        if: ${{ inputs.publish }}
        run: |
          python scripts/update_news.py --publish
      - name: Commit and Push Changes
        if: ${{ inputs.publish }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action AI"
          git add index.html noticias.html paises.html economia.html desporto.html mercados.html tech.html geopolitica.html ouro.html conteudos/news-archive.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "update news" && git push origin HEAD:main)
