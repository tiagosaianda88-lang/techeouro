name: AI News Aggregator

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser google-genai beautifulsoup4 pypdf
      - name: Run AI News and Country Scripts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/update_news.py
          python scripts/update_news.py --publish
          python scripts/update_countries.py
      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add *.html conteudos/news-archive.json
          git diff --staged --quiet || (git commit -m "update news" && git pull --rebase origin main && git push origin HEAD:main)
